name: Build WinLocker

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x86'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pywin32
    
    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --uac-admin --name WinLocker --hidden-import=win32api --hidden-import=win32con --hidden-import=win32gui --hidden-import=win32security --hidden-import=ctypes --hidden-import=tkinter --hidden-import=threading --hidden-import=subprocess --hidden-import=shutil --hidden-import=tempfile --hidden-import=time --hidden-import=os --hidden-import=sys --hidden-import=platform --hidden-import=socket --clean --noconfirm winlocker.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WinLocker
        path: dist/WinLocker.exe
        retention-days: 90
    
    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: WinLocker v1.0.${{ github.run_number }}
        files: dist/WinLocker.exe
        draft: false
        prerelease: false
